[service]
name = "neo4j"
default_ports = [7474, 7687]
description = "Neo4j Graph Database"

[[probe]]
name = "bolt_handshake"
payload = '\x60\x60\xb0\x17\x00\x00\x00\x04\x00\x00\x00\x03\x00\x00\x00\x02\x00\x00\x00\x01'
protocol = "tcp"

[[match]]
name = "bolt_response"
pattern = '^[\x00\x01\x02\x03\x04]{4}'
product = "neo4j_bolt"
