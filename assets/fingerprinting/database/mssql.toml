[service]
name = "mssql"
default_ports = [1433]
description = "Microsoft SQL Server"

# TDS Pre-Login packet
[[probe]]
name = "tds_prelogin"
payload = '\x12\x01\x00\x34\x00\x00\x00\x00\x00\x00\x15\x00\x06\x01\x00\x1b\x00\x01\x02\x00\x1c\x00\x0c\x03\x00\x28\x00\x04\x04\x00\x2c\x00\x01\xff\x08\x00\x01\x55\x00\x00\x00\x4d\x53\x53\x51\x4c\x53\x45\x52\x56\x45\x52\x00'
protocol = "tcp"

[[match]]
name = "mssql_prelogin_response"
pattern = '^[\x04\x12][\x01\x00]'
product = "mssql"
