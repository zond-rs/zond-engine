[service]
name = "http"
default_ports = [80, 8080, 8000, 443, 8443]
description = "Hypertext Transfer Protocol"

# The probe that will be sent to the target to elicit an HTTP response
[[probe]]
name = "get_root"
payload = 'GET / HTTP/1.1\r\nHost: localhost\r\nUser-Agent: ZondScanner/1.0\r\nAccept: */*\r\n\r\n'
protocol = "tcp"

# Match rules applied against the HTTP response
[[match]]
name = "generic_http"
pattern = '(?i)^HTTP/\d+\.\d+\s+\d+'
product = "http"

[[match]]
name = "nginx_server_header"
pattern = '(?i)Server:\s*nginx/([\d\.]+)'
version_group = 1
vendor = "NGINX"
product = "nginx"

[[match]]
name = "apache_server_header"
pattern = '(?i)Server:\s*Apache/([\d\.]+)'
version_group = 1
vendor = "Apache Software Foundation"
product = "Apache HTTP Server"

[[match]]
name = "lighttpd_server_header"
pattern = '(?i)Server:\s*lighttpd/([\d\.]+)'
version_group = 1
vendor = "lighttpd"
product = "lighttpd"
