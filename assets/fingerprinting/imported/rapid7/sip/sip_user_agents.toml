pattern = "^(TAU-\\d+[A-Z]*(?:\\.IP)?)/([\\d.]+) SN/(VI[0-9A-Z]+) (?:SHA/[0-9a-f]+ )?sofia-sip/([\\d.]+)$"
vendor = "FreeSWITCH"
product = "FreeSWITCH"
context = "sip_header.user_agent"
example = "TAU-8.IP/2.3.0 SN/VI12345678 sofia-sip/1.12.10"
metadata = { "service.device" = "SIP Gateway", "service.cpe23" = "cpe:/a:freeswitch:freeswitch:-", "service.component.vendor" = "FreeSWITCH", "service.component.product" = "sofia-sip", "service.component.version" = "{capture:4}", "os.vendor" = "Eltex", "os.product" = "{hw.product} Firmware", "os.version" = "{capture:2}", "os.device" = "VoIP Gateway", "hw.vendor" = "Eltex", "hw.product" = "{capture:1}", "hw.serial_number" = "{capture:3}", "hw.device" = "VoIP Gateway" }

[[match]]
name = "Eltex TAU model VoIP gateway - build variant with sofia version"
pattern = "^(TAU-\\d{1,2}) (?:build |v)([\\d.]+) (?:with )?sofia-sip/([\\d.]+)$"
vendor = "FreeSWITCH"
product = "FreeSWITCH"
context = "sip_header.user_agent"
example = "TAU-72 build 2.18.0.35 sofia-sip/1.12.10"
metadata = { "service.device" = "SIP Gateway", "service.cpe23" = "cpe:/a:freeswitch:freeswitch:-", "service.component.vendor" = "FreeSWITCH", "service.component.product" = "sofia-sip", "service.component.version" = "{capture:3}", "os.vendor" = "Eltex", "os.product" = "{hw.product} Firmware", "os.version" = "{capture:2}", "os.device" = "VoIP Gateway", "hw.vendor" = "Eltex", "hw.product" = "{capture:1}", "hw.device" = "VoIP Gateway" }

[[match]]
name = "Eltex SMG model VoIP gateway - no model number"
pattern = "^(?:Eltex )?(?:smg_pa_sip[ -]){1,2}([\\d.]+)$"
context = "sip_header.user_agent"
example = "Eltex smg_pa_sip smg_pa_sip-3.9.1.50"
metadata = { "os.vendor" = "Eltex", "os.product" = "SMG Firmware", "os.version" = "{capture:1}", "os.device" = "VoIP Gateway", "hw.vendor" = "Eltex", "hw.device" = "VoIP Gateway" }

[[match]]
name = "Eltex - NTP / NTU model broadband router - with serial number and sofia version"
pattern = "^(RG-\\d[\\w-]+)/([\\d.]+) SN/(VI\\w+) (?:SHA/[0-9a-f]+ )?sofia-sip/([\\d.]+)$"
vendor = "FreeSWITCH"
product = "FreeSWITCH"
context = "sip_header.user_agent"
example = "RG-5421G-Wac/2.4.2.87 SN/VI12E45678 sofia-sip/1.12.10"
metadata = { "service.device" = "SIP Gateway", "service.cpe23" = "cpe:/a:freeswitch:freeswitch:-", "service.component.vendor" = "FreeSWITCH", "service.component.product" = "sofia-sip", "service.component.version" = "{capture:4}", "os.vendor" = "Eltex", "os.product" = "{hw.product} Firmware", "os.version" = "{capture:2}", "os.device" = "Broadband Router", "hw.vendor" = "Eltex", "hw.product" = "{capture:1}", "hw.serial_number" = "{capture:3}", "hw.device" = "Broadband Router" }

