version_group = 1
vendor = "Communigate"
product = "Communigate Pro"
context = "sip_header.server"
example = "CommuniGatePro/6.2.14"
metadata = { "service.family" = "Pro", "service.cpe23" = "cpe:/a:communigate:communigate_pro:{service.version}" }

[[match]]
name = "STARFACE GmhH STARFACE PBX"
pattern = "^STARFACE PBX$"
vendor = "STARFACE GmhH"
product = "STARFACE PBX"
context = "sip_header.server"
example = "STARFACE PBX"
metadata = { "service.family" = "SIP Server" }

[[match]]
name = "Fortinet FortiVoice"
pattern = "^FortiVoice-([\\w-]+)$"
vendor = "Fortinet"
product = "FortiVoice"
context = "sip_header.server"
example = "FortiVoice-200D"
metadata = { "service.device" = "SIP Gateway", "service.cpe23" = "cpe:/a:fortinet:fortivoice:-", "hw.vendor" = "Fortinet", "hw.family" = "FortiVoice", "hw.product" = "{capture:1}", "hw.device" = "SIP Gateway" }

[[match]]
name = "FreeSWITCH FreeSWITCH"
pattern = "^Freeswitch ([\\d.]+)$"
version_group = 1
vendor = "FreeSWITCH"
product = "FreeSWITCH"
context = "sip_header.server"
example = "Freeswitch 2.0.0"
metadata = { "service.device" = "SIP Gateway", "service.cpe23" = "cpe:/a:freeswitch:freeswitch:{service.version}" }

[[match]]
name = "Unify OpenStage VoIP Phone 1"
pattern = "^(OpenStage|OpenScape)_(\\d+)_(V\\d \\S+) "
context = "sip_header.server"
example = "OpenStage_40_V3 R5.13.0      SIP  190111"
metadata = { "os.vendor" = "Unify", "os.product" = "{hw.family} {unify.model} Firmware", "hw.vendor" = "Unify", "hw.product" = "{hw.family} {unify.model}", "hw.device" = "VoIP", "hw.family" = "{capture:1}", "unify.model" = "{capture:2}", "os.version" = "{capture:3}" }

[[match]]
name = "Unify OpenStage VoIP Phone 2"
pattern = "^Desk_Phone_IP_(CP\\d+[EXT]?)_(V\\d \\S+) "
context = "sip_header.server"
example = "Desk_Phone_IP_CP200_V1 R6.14.0      SIP  190802"
metadata = { "os.vendor" = "Unify", "hw.vendor" = "Unify", "hw.family" = "OpenScape Desk Phone", "hw.product" = "{hw.family} {unify.model}", "hw.device" = "VoIP", "unify.model" = "{capture:1}", "os.version" = "{capture:2}" }

[[match]]
name = "Eltex ESR model service gateway"
pattern = "^Eltex (ESR-\\d\\w{1,4})$"
context = "sip_header.server"
example = "Eltex ESR-12V"
metadata = { "os.vendor" = "Eltex", "os.device" = "Router", "os.product" = "{hw.product} Firmware", "hw.vendor" = "Eltex", "hw.product" = "{capture:1}", "hw.device" = "Router" }

