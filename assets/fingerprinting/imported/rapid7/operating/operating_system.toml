[[match]]
name = "Juniper"
pattern = "(?i)^(?:Juniper\\s?)?(Junos|Junos OS|ScreenOS)\\s?(\\d+(?:\\.\\d+?)*(?:X\\d{2})?)?$"
context = "operating_system.name"
example = "Junos"
metadata = { "os.vendor" = "Juniper", "os.family" = "{capture:1}", "os.product" = "{capture:1}", "os.version" = "{capture:2}" }

[[match]]
name = "Cisco"
pattern = "(?i)^(?:Cisco\\s?)?(ASA|Adaptive Security Appliance|IOS|IOS-XE|IOS-XR|NX-OS|PIX-OS|SAN-OS)\\s?(?:Version (\\d+(?:\\.\\d+)*(?:\\(\\d+(?:\\.\\d+)*\\))?))?$"
context = "operating_system.name"
example = "Cisco ASA"
metadata = { "os.vendor" = "Cisco", "os.family" = "{capture:1}", "os.product" = "{capture:1}", "os.version" = "{capture:2}" }

