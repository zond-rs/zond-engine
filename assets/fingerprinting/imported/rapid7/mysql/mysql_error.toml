pattern = "Не можу визначити ім'я хосту для вашої адреси"
vendor = "Oracle"
product = "MySQL"
context = "mysql.error"
example = "Не можу визначити ім'я хосту для вашої адреси"
metadata = { "service.family" = "MySQL", "service.cpe23" = "cpe:/a:oracle:mysql:-" }

[[match]]
name = "MariaDB MariaDB - Error: Host not allowed to connect (English) "
pattern = "^Host '[^']+' is not allowed to connect to this MariaDB server$"
vendor = "MariaDB"
product = "MariaDB"
context = "mysql.error"
example = "Host '10.10.10.10' is not allowed to connect to this MariaDB server"
metadata = { "service.family" = "MySQL", "service.cpe23" = "cpe:/a:mariadb:mariadb:-" }

[[match]]
name = "Oracle MySQL Proxy - Error: Host not allowed to connect"
pattern = "^#07000Proxy Warning - IP Forbidden$"
vendor = "Oracle"
product = "MySQL Proxy"
context = "mysql.error"
example = "#07000Proxy Warning - IP Forbidden"
metadata = { "service.family" = "MySQL" }

[[match]]
name = "Oracle MySQL Proxy - Error: Backends down"
pattern = "^\\(proxy\\) all backends are down$"
vendor = "Oracle"
product = "MySQL Proxy"
context = "mysql.error"
example = "(proxy) all backends are down"
metadata = { "service.family" = "MySQL" }

