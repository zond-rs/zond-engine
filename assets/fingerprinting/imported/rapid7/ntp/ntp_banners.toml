pattern = "version=Domain Time II (\\S+),hostname=([^,]+),.*system=Win2003.*,processor=(\\S+)"
version_group = 1
vendor = "Greyware Automation Products, Inc."
product = "Domain Time II"
context = "ntp.readvar"
example = "\n      version=Domain Time II 5.1.b.20100331R,hostname=blah,domain=,flat=WORKGROUP,system=Win2003 x64,processor=x64\n    "
