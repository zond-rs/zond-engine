[[match]]
name = "NTP on an unknown system"
pattern = "version=\"ntpd ([^ ]+)[^\"]+\",\\s*processor,\\s*system=\"/\""
version_group = 1
product = "NTP"
context = "ntp.readvar"
example = "\n      version=\"ntpd 4.2.6p2-RC4@1.2180-o Sun Jun 13 02:56:12 UTC 2010 (2)\", processor, system=\"/\"\n    "
metadata = { "service.family" = "NTP" }

