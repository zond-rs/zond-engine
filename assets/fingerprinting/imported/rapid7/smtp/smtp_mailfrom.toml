[service]
attribution = "Rapid7 Recog"
name = "smtp"
default_ports = []
description = "Imported from Rapid7 smtp_mailfrom"

[[match]]
name = "exim"
pattern = "250 .* is syntactically correct *"
vendor = "exim"
product = "exim"
context = "unknown"
example = "250 <nosuchuser@rapid7.com> is syntactically correct"
metadata = { "service.family" = "exim", "service.cpe23" = "cpe:/a:exim:exim:-" }

[[match]]
name = "GNAT Box SMTP"
pattern = "501[ -]System error\\. *"
vendor = "Global Technology Associates"
product = "GNAT Box"
context = "unknown"
metadata = { "service.family" = "GNAT Box" }

