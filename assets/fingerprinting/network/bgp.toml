[service]
name = "bgp"
default_ports = [179]
description = "Border Gateway Protocol"

[[probe]]
name = "bgp_open"
payload = '\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\x00\x1d\x01\x04\x00\x00\x00\xb4\x00\x00\x00\x00\x00'
protocol = "tcp"

[[match]]
name = "bgp_header"
pattern = '^\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff'
product = "bgp"
